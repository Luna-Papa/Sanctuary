{% extends 'base.html' %}
{% load static %}

{% block title %}
手工下发数据
{% endblock %}

{% block custom_css %}
    <link href="{% static 'css/plugins/iCheck/custom.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/bootstrap-tagsinput/bootstrap-tagsinput.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/colorpicker/bootstrap-colorpicker.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/cropper/cropper.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/switchery/switchery.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/jasny/jasny-bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/nouslider/jquery.nouislider.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/datapicker/datepicker3.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/ionRangeSlider/ion.rangeSlider.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/awesome-bootstrap-checkbox/awesome-bootstrap-checkbox.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/clockpicker/clockpicker.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/daterangepicker/daterangepicker-bs3.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/select2/select2.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/select2/select2-bootstrap4.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/touchspin/jquery.bootstrap-touchspin.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/plugins/dualListbox/bootstrap-duallistbox.min.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
    <div class="wrapper wrapper-content animated fadeIn">
        <div class="ibox-content">
            <div class="row col-lg-12 form-group" style="margin-top: 20px">
                <div class="col-lg-6" style="padding-right: 0">
                    <div class="ibox">
                        <!-- title -->
                        <div class="ibox-title">
                            <h5>选择要下发的机构</h5>
                        </div>
                        <!-- form : 农商银行选择 -->
                        <div class="ibox-content">
                            <p></p>
                            <form id="user-form" action="#" class="wizard-big">
                                {% csrf_token %}
                                <select class="form-control dual_select" multiple id="DataUsers">
                                    {% for data_user in data_users %}
                                        <option value="{{ data_user.user_id }}">
                                            {{ data_user.user_id }} | {{ data_user.org_name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6" style="padding-left: 0">
                    <div class="ibox">
                        <!-- title -->
                        <div class="ibox-title">
                            <h5>选择要下发的表</h5>
                        </div>
                        <!-- form : 数据表选择  -->
                        <div class="ibox-content">
                            <p></p>
                            <form id="table-form" action="#" class="wizard-big">
                                {% csrf_token %}
                                <select class="form-control dual_select" multiple id="Tables">
                                    {% for table in tables %}
                                        <option value="{{ table.id }}">
                                            {{ table.ds_id }}.{{ table.table_name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div class="hr-line-dashed"></div>
            <div class="row form-group col-sm-12">
                <div class="col-sm-4 col-sm-offset-2">
                    <button class="btn btn-white btn-lg" type="submit" style="margin-right: 40px">
                        取消
                    </button>
                    <button class="btn btn-primary btn-lg" type="submit" id="submit">
                        提交
                    </button>
                </div>
            </div>
        </div>
    </div>

{% endblock %}

{% block custom_js %}
    <script src="{% static 'js/inspinia.js' %}"></script>
    <script src="{% static 'js/plugins/pace/pace.min.js' %}"></script>
    <script src="{% static 'js/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
    <!-- JSKnob -->
    <script src="{% static 'js/plugins/jsKnob/jquery.knob.js' %}"></script>
    <!-- Input Mask-->
    <script src="{% static 'js/plugins/jasny/jasny-bootstrap.min.js' %}"></script>
    <!-- Data picker -->
    <script src="{% static 'js/plugins/datapicker/bootstrap-datepicker.js' %}"></script>
    <!-- NouSlider -->
    <script src="{% static 'js/plugins/nouslider/jquery.nouislider.min.js' %}"></script>
    <!-- Switchery -->
    <script src="{% static 'js/plugins/switchery/switchery.js' %}"></script>
    <!-- IonRangeSlider -->
    <script src="{% static 'js/plugins/ionRangeSlider/ion.rangeSlider.min.js' %}"></script>
    <!-- iCheck -->
    <script src="{% static 'js/plugins/iCheck/icheck.min.js' %}"></script>
    <!-- MENU -->
    <script src="{% static 'js/plugins/metisMenu/jquery.metisMenu.js' %}"></script>
    <!-- Color picker -->
    <script src="{% static 'js/plugins/colorpicker/bootstrap-colorpicker.min.js' %}"></script>
    <!-- Clock picker -->
    <script src="{% static 'js/plugins/clockpicker/clockpicker.js' %}"></script>
    <!-- Image cropper -->
    <script src="{% static 'js/plugins/cropper/cropper.min.js' %}"></script>
    <!-- Date range use moment.js same as full calendar plugin -->
    <script src="{% static 'js/plugins/fullcalendar/moment.min.js' %}"></script>
    <!-- Date range picker -->
    <script src="{% static 'js/plugins/daterangepicker/daterangepicker.js' %}"></script>
    <!-- Select2 -->
    <script src="{% static 'js/plugins/select2/select2.full.min.js' %}"></script>
    <!-- TouchSpin -->
    <script src="{% static 'js/plugins/touchspin/jquery.bootstrap-touchspin.min.js' %}"></script>
    <!-- Tags Input -->
    <script src="{% static 'js/plugins/bootstrap-tagsinput/bootstrap-tagsinput.js' %}"></script>
    <!-- Dual Listbox -->
    <script src="{% static 'js/plugins/dualListbox/jquery.bootstrap-duallistbox.js' %}"></script>

{% endblock %}

{% block custom_page_js %}

    <script>
        $(document).ready(function () {
            $('.i-checks').iCheck({
                checkboxClass: 'icheckbox_square-green',
                radioClass: 'iradio_square-green',
            });
        });

        $(document).ready(function(){
            $('.tagsinput').tagsinput({
                tagClass: 'label label-primary'
            });
            $('.dual_select').bootstrapDualListbox({
                selectorMinimalHeight: 160
            });
        });

        $(function () {
            $('#submit').click(function () {
                <!-- 必须同时选择机构和数据表，任一为空告警 -->
                const select_users =
                    $('#user-form > div > div.box2.col-md-6 > select > option:nth-child(1)').val();
                const select_tables =
                    $('#table-form > div > div.box2.col-md-6 > select > option:nth-child(1)').val();
                if (select_users === undefined || select_tables === undefined) alert("未选择机构或数据表！");
                <!-- 外层循环 ：机构 -->
                <!-- 内层循环 ：数据表 -->
                let count = 0;
                $('#DataUsers').find('option:selected').each(function () {
                    const user = $(this).val()
                    $('#Tables').find('option:selected').each(function () {
                        count = count + 1;
                        const table_id = $(this).val()
                        $.ajax({
                            url: '',
                            type: 'post',
                            data: {
                                csrfmiddlewaretoken: '{{ csrf_token }}',
                                'org_no': user,
                                'table_id': table_id,
                            },
                            success: function (data) {
                                console.log(data)
                                console.log("提交成功")
                            }
                        })
                    })
                });
                <!-- 完成提交后刷新页面 -->
                alert("您本次提交了" + count + "个下发任务，后台将陆续进行处理，请耐心等待。")
                window.location.reload();
            });
        });

    </script>

{% endblock %}
